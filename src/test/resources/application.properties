spring.application.name=trailhead-api

# -- Datasource (H2 in MySQL mode) ----------------------------------------
spring.datasource.url=jdbc:h2:mem:testdb;MODE=MYSQL;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# -- JPA / Hibernate ------------------------------------------------------
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

# -- Flyway ---------------------------------------------------------------
spring.flyway.enabled=true

# -- JWT ------------------------------------------------------------------
auth.jwt.issuer=trailhead-api-test
auth.jwt.expiration-ms=900000

# -- Refresh Token (body delivery for simpler test assertions) ------------
auth.refresh-token.expiration-ms=604800000
auth.refresh-token.delivery=body
auth.refresh-token.cookie-name=refresh_token
auth.refresh-token.cookie-secure=false
auth.refresh-token.cookie-same-site=Strict
auth.refresh-token.cookie-path=/api/auth
auth.refresh-token.cookie-max-age-seconds=604800

# -- Email Verification ---------------------------------------------------
auth.verification.expiration-ms=86400000
auth.verification.frontend-base-url=http://localhost:5173

# -- Password Reset -------------------------------------------------------
auth.password-reset.expiration-ms=900000
auth.password-reset.frontend-base-url=http://localhost:5173

# -- Mail (host empty so EmailVerificationService logs instead of sending) ----
spring.mail.host=
spring.mail.port=587
management.health.mail.enabled=false

# -- CORS -----------------------------------------------------------------
cors.allowed-origins=http://localhost:5173

# -- Admin Seeder (disabled in tests) -------------------------------------
admin.seed.email=admin@test.local
admin.seed.password=
