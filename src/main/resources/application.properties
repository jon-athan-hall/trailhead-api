spring.application.name=trailhead-api

# -- Datasource (MySQL) ---------------------------------------------------
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:trailhead}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=${DB_USERNAME:}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# --T JPA / Hibernate ------------------------------------------------------
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# -- Flyway ---------------------------------------------------------------
spring.flyway.enabled=true

# -- JWT ------------------------------------------------------------------
auth.jwt.issuer=trailhead-api
auth.jwt.expiration-ms=900000

# -- Refresh Token --------------------------------------------------------
auth.refresh-token.expiration-ms=604800000
auth.refresh-token.delivery=body
auth.refresh-token.cookie-name=refresh_token
auth.refresh-token.cookie-secure=true
auth.refresh-token.cookie-same-site=Strict
auth.refresh-token.cookie-path=/api/auth
auth.refresh-token.cookie-max-age-seconds=604800

# -- Email Verification -------------------------------------------------------
auth.verification.expiration-ms=86400000
auth.verification.frontend-base-url=${FRONTEND_BASE_URL:http://localhost:3000}

# -- Mail ---------------------------------------------------------------------
spring.mail.host=${MAIL_HOST:}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
management.health.mail.enabled=false

# -- Admin Seeder ------------------------------------------------------------
admin.seed.email=${ADMIN_SEED_EMAIL:}
admin.seed.password=${ADMIN_SEED_PASSWORD:}
