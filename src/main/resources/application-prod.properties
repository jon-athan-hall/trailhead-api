# Production overrides. All sensitive values must come from environment variables.

# Refresh token via secure HTTP-only cookie.
auth.refresh-token.delivery=cookie
auth.refresh-token.cookie-secure=true

# Frontend URL must be set via env var in production.
auth.verification.frontend-base-url=${FRONTEND_BASE_URL}
auth.password-reset.frontend-base-url=${FRONTEND_BASE_URL}

# Real SMTP server required.
spring.mail.host=${MAIL_HOST}

# CORS allowed origins must be set via env var (comma-separated).
cors.allowed-origins=${CORS_ALLOWED_ORIGINS}
