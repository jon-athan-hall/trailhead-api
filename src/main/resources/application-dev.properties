# Local development overrides.

# Refresh token in body for easy Postman testing.
auth.refresh-token.delivery=body
auth.refresh-token.cookie-secure=false

# Frontend running locally.
auth.verification.frontend-base-url=${FRONTEND_BASE_URL:http://localhost:5173}
auth.password-reset.frontend-base-url=${FRONTEND_BASE_URL:http://localhost:5173}

# No mail host -- emails are logged to the console.
spring.mail.host=

# CORS allowed origins for local development.
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}
